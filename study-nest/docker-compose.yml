version: '3.8'

services:
  # PHP Backend API
  api:
    build:
      context: ./api
    ports:
      - "8000:80"
    volumes:
      - ./api:/var/www/html
    environment:
      - DB_HOST=db
      - DB_NAME=studynest
      - DB_USER=postgres
      - DB_PASS=postgres
      - DB_PORT=5432
    depends_on:
      - db

  # Node.js Realtime Server
  realtime:
    build:
      context: ./src/realtime
    ports:
      - "5174:5173" # Mapped to 5174 to avoid conflict if frontend runs on host 5173
    volumes:
      - ./src/realtime:/app
      - /app/node_modules
    environment:
      - PORT=5173

  # Python AI Service
  ai:
    build:
      context: ./src/Python
    ports:
      - "5001:5000"
    volumes:
      - ./src/Python:/app
    environment:
      - PORT=5000

  # Database (Local Testing)
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=studynest
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
